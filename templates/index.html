<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة درجات الطلاب</title>
    <style>
        body { background-color: #0b3d66; color: white; font-family: 'Segoe UI', Tahoma; text-align: center; padding-top: 50px; }
        .search-box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 15px; border: 1px solid #3498db; display: inline-block; }
        input { padding: 12px; width: 250px; border-radius: 8px; border: none; }
        button { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-search { background: #3498db; color: white; }
        .btn-sort { background: #27ae60; color: white; }
        table { width: 90%; margin: 30px auto; border-collapse: collapse; background: rgba(0,0,0,0.3); }
        th { background: #1a5276; color: #add8e6; padding: 15px; border: 1px solid #3498db; }
        td { padding: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .details-btn { background: white; color: #0b3d66; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>🎓 نظام إدارة درجات الطلاب - دفعة 2029</h1>
    
    <div class="search-box">
        <form action="/search" method="post" style="margin-bottom: 20px;">
            <input type="text" name="student_id" placeholder="الرقم الجامعي أو الاسم..." required>
            <button type="submit" class="btn-search">بحث</button>
        </form>

        <form action="/sort" method="post">
            <select name="column_index" style="padding: 10px; border-radius: 5px;">
                <option value="138">المعدل الحالي</option>
                <option value="139">معدل السنة الثانية</option>
                <option value="134">معدل الفرز</option>
                <option value="137">معدل السنة الثالثة</option>
            </select>
            <button type="submit" class="btn-sort">فرز وترتيب الأوائل</button>
        </form>
    </div>

    {% if results %}
    <table>
        <thead>
            <tr>
                <th>الترتيب</th>
                <th>الرقم الجامعي</th>
                <th>الاسم الكامل</th>
                <th>الدرجة</th>
                <th>الخيار</th>
            </tr>
        </thead>
        <tbody>
            {% for row in results %}
            <tr>
                <td><b>{{ loop.index }}</b></td>
                <td>{{ row[0] }}</td>
                <td>{{ row[5] }}</td>
                <td style="color: #2ecc71; font-weight: bold;">{{ row[sorted_col] }}</td>
                <td><a href="/student/{{ row[0] }}" class="details-btn">عرض التفاصيل ←</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% endif %}
</body>
</html>
